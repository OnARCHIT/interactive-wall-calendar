<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calendar Layout Reference</title>

<style>

body{

font-family:system-ui;

background:#f1f5f9;

display:flex;

justify-content:center;

padding:40px;

}

.wall{

width:900px;

background:white;

padding:20px;

border-radius:18px;

box-shadow:0 20px 60px rgba(0,0,0,.08);

}

.hero{

height:220px;

border-radius:14px;

background:url("/images/calendarHero.jpg") center/cover;

margin-bottom:20px;

}

.grid{

display:grid;

grid-template-columns:repeat(7,1fr);

gap:8px;

margin-top:12px;

}

.day{

height:42px;

border-radius:10px;

background:#f1f5f9;

display:flex;

align-items:center;

justify-content:center;

}

.notes{

margin-top:20px;

padding:14px;

background:#f8fafc;

border-radius:12px;

}

</style>

</head>


<body>


<div class="wall">

<div class="hero"></div>


<h3>Month Grid</h3>

<div class="grid">

<div class="day">1</div>
<div class="day">2</div>
<div class="day">3</div>
<div class="day">4</div>
<div class="day">5</div>
<div class="day">6</div>
<div class="day">7</div>

</div>


<div class="notes">

Notes section example

</div>


</div>


</body>

</html>
